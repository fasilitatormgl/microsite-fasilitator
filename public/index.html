<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsite Fasilitator</title>

<link rel="icon" href="/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('/backgroundmgl.webp');

  background-size:cover;
  min-height:100vh;
}

/* CARD */
.glass {
  background: rgba(236, 222, 222, 0.11);
  backdrop-filter: blur(25px);
}

/* LINK BUTTON (FIX WARNA HITAM) */
/* LINK BUTTON (HITAM + GLOW TIPIS) */
.link {
  transition:0.25s;
  color: black;

  text-shadow:
    0 0 2px rgba(245, 240, 240, 0.6),
    0 0 6px rgba(241, 232, 232, 0.774);
}
.link:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px cyan;

  text-shadow:
    0 0 4px rgba(58, 199, 235, 0.9),
    0 0 10px rgba(115, 193, 238, 0.452);
}

/* ANIMASI */
.fade {
  animation:fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* NEON */
.neon {
  color: cyan;
  text-shadow: 0 0 5px cyan, 0 0 20px cyan;
}

/* MARQUEE */
.marquee-modern {
  overflow: hidden;
  white-space: nowrap;
}
.marquee-modern span {
  display: inline-block;
  padding-left: 100%;
  animation: jalan 10s linear infinite;
}
@keyframes jalan {
  0% { transform: translateX(0);}
  100% { transform: translateX(-100%);}
}

/* FOOTER */
.app-footer {
  margin-top: 20px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
}
.footer-link-utama {
  font-size: 16px;
  font-weight: bold;
  color: rgb(0, 255, 255);
  text-shadow: 0 0 8px rgba(0,255,255,0.9);
  display: block;
  margin-bottom: 4px;
}
.footer-small {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
}
</style>
</head>

<body class="flex flex-col items-center justify-center p-4">

<div id="app" class="w-full max-w-md text-center">Loading...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDSnHojwSRgk71MPpOuvFlgwiGnv8GPuc4",
  authDomain: "gofasilitator.firebaseapp.com",
  projectId: "gofasilitator",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const slug = window.location.pathname.replace("/", "").toLowerCase();

if(!slug || slug==="index.html"){
  app.innerHTML="<h2>Microsite Fasilitator</h2>";
}else{
  load(slug);
}

/* LOAD DATA */
function load(slug){
  db.collection("microsites").doc(slug).get().then(doc=>{
    if(!doc.exists){
      app.innerHTML="Not Found";
      return;
    }

    const d = doc.data();

    let html = `
    <div class="glass p-6 rounded-3xl fade">

      <!-- HEADER -->
      <div class="flex items-center justify-center gap-2 mb-2">
        <img src="/logo.png" class="w-9 h-9 animate-pulse">
        <div class="text-lg neon font-bold">Microsite Fasilitator</div>
      </div>

      <!-- RUNNING TEXT -->
      <div class="marquee-modern text-xs text-cyan-300 mb-2">
        <span class="neon">
          🚀 Fasilitator PRODAMAI Magelang 🚀 &nbsp;&nbsp;&nbsp;
          🚀 Fasilitator PRODAMAI Magelang 🚀
        </span>
      </div>

      <h1 class="text-2xl font-bold text-center neon mb-1">
        ${d.title}
      </h1>

      <p class="opacity-70 mb-4 text-center">
        ${d.description}
      </p>

      <div id="links" class="space-y-3"></div>

      <!-- QR -->
      <div class="mt-5 text-center">
        <div class="flex justify-center">
          <canvas id="qr"></canvas>
        </div>

        <div class="text-xs mt-2 break-all opacity-70">
          ${location.href}
        </div>

        <button onclick="copyLink()"
        class="mt-2 bg-cyan-500 text-black px-4 py-2 rounded font-bold active:scale-95 transition w-full">
        🔗 Copy Link
      </button>

      <button onclick="shareLink()"
        class="mt-2 bg-green-500 text-black px-4 py-2 rounded font-bold active:scale-95 transition w-full">
        📤 Share Link
      </button>
      </div>
        
        <button onclick="downloadQR()"
        class="mt-3 bg-green-500 text-black px-4 py-2 rounded">
          ⬇️ Download QR
        </button>

    </div>
    `;

    app.innerHTML = html;

    let linksHTML = "";

    d.links.forEach(l=>{
      linksHTML += `
      <button onclick="openLink('${l.url}')"
      class="link glass block py-4 px-3 rounded-xl fade w-full text-center font-semibold text-lg">
        🔗 ${l.name}
      </button>`;
    });

    document.getElementById("links").innerHTML = linksHTML;

    QRCode.toCanvas(document.getElementById("qr"), location.href);
  });
}

/* OPEN LINK */
function openLink(url){
  window.open(url, "_blank");
}

/* COPY LINK */
function copyLink(){
  const slug = location.pathname.replace("/", "");
  const url = location.href;

  const text =
`🚀 Akses link ${slug} melalui link ini:

${url}`;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showNotif("Link disalin!"))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

/* SHARE LINK */
function shareLink(){
  const slug = location.pathname.replace("/", "");
  const url = location.href;

  const text =
`🚀 Akses link ${slug} melalui link ini:

${url}`;

  if (navigator.share) {
    navigator.share({
      title: "Microsite Fasilitator",
      text: text,
      url: url
    }).catch(() => {});
  } else {
    fallbackCopy(text);
    showNotif("Link disalin untuk dibagikan!");
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;

  textarea.style.position = "fixed";
  textarea.style.opacity = "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    alert("Link berhasil disalin!");
  } catch (err) {
    alert("Gagal copy, silakan copy manual.");
  }

  document.body.removeChild(textarea);
}

/* NOTIF */
function showNotif(msg){
  const notif = document.createElement("div");
  notif.innerText = msg;

  notif.style.position = "fixed";
  notif.style.bottom = "40px";
  notif.style.left = "50%";
  notif.style.transform = "translateX(-50%)";
  notif.style.background = "cyan";
  notif.style.color = "black";
  notif.style.padding = "10px 15px";
  notif.style.borderRadius = "10px";
  notif.style.zIndex = "99999";

  document.body.appendChild(notif);
  setTimeout(()=>notif.remove(),2000);
}

/* DOWNLOAD QR */
function downloadQR(){
  const canvas = document.getElementById("qr");

  const slug = location.pathname.replace("/","");
  const domain = location.hostname.replace(/\./g,"-");

  const link = document.createElement("a");
  link.href = canvas.toDataURL();
  link.download = "microsite-" + domain + "-" + slug + ".png";
  link.click();
}
</script>

<!-- FOOTER -->
<footer class="app-footer">
  <a href="https://siomaimagelang.web.app/" target="_blank"
     class="footer-link-utama">
    🚀 Akses SIOMAI - Sistem Informasi Prodamai
  </a>
  <div class="footer-small">
    by Koord Prodamai Penunggu kantor
  </div>
</footer>

</body>
</html>
