<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Microsite Fasilitator</title>

<link rel="icon" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="p-4 md:p-6 max-w-6xl mx-auto">

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loader"></div>
  <p class="mt-4 text-cyan-300">Memuat Dashboard...</p>
</div>

<!-- HEADER -->
<div class="mb-6 fade">
  <h1 class="text-3xl font-bold neon">
    🚀 Dashboard Microsite
  </h1>
  <p class="opacity-70">
    Kelola microsite fasilitator dengan mudah
  </p>
</div>

<!-- GRID -->
<div class="grid lg:grid-cols-3 gap-6">

  <!-- FORM -->
  <div class="lg:col-span-1 glass p-5 rounded-2xl fade">

    <h2 class="text-xl font-bold mb-4 neon">
      ➕ Buat Microsite
    </h2>

    <!-- INFO -->
    <div class="mb-5">
      <h3 class="text-sm opacity-70 mb-2">
        Informasi Microsite
      </h3>

      <input
        id="slug"
        placeholder="slug-contoh-tidak-ada-spasi"
        class="w-full p-3 text-black rounded-lg mb-3"
      >

      <input
        id="title"
        placeholder="Judul Microsite"
        class="w-full p-3 text-black rounded-lg mb-3"
      >

      <input
        id="desc"
        placeholder="Deskripsi"
        class="w-full p-3 text-black rounded-lg mb-3"
      >

      <!-- KATEGORI MICROSITE -->
      <select
        id="micrositeCategory"
        class="w-full p-3 text-black rounded-lg"
      >
        <option value="OPD">🏘️ OPD</option>
        <option value="Kecamatan">🏢 Kecamatan</option>
        <option value="Dokumen">📄 Dokumen</option>
        <option value="FASILITATOR">🔒 FASILITATOR</option>
        <option value="Publik">🌐 Publik</option>
        <option value="Lainnya">📁 Lainnya</option>
      </select>
    </div>

    <!-- DAFTAR LINK -->
    <div class="mb-5">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-sm opacity-70">
          Daftar Link
        </h3>

        <button
          onclick="addLink()"
          class="bg-green-500 px-3 py-1 rounded-lg text-black font-semibold"
        >
          + Tambah
        </button>
      </div>

      <!-- FILTER & SEARCH LINK -->
      <div class="mt-2 mb-2 space-y-2">
        <input
          type="text"
          id="linkSearch"
          placeholder="🔍 Cari link (nama/URL)..."
          class="w-full p-2 text-black rounded-lg text-sm"
        >
        <div class="flex flex-wrap gap-1" id="categoryFilters">
          <button class="cat-filter-btn active" data-cat="Dokumen">📄 Dokumen</button>
          <button class="cat-filter-btn active" data-cat="Website">🌐 Website</button>
          <button class="cat-filter-btn active" data-cat="Spreadsheet">📊 Spreadsheet</button>
          <button class="cat-filter-btn active" data-cat="Drive">📂 Drive</button>
          <button class="cat-filter-btn active" data-cat="Lainnya">🔗 Lainnya</button>
        </div>
      </div>

      <div id="links" class="space-y-2"></div>
    </div>

    <!-- SAVE -->
    <button
      onclick="save()"
      class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl"
    >
      💾 Simpan Microsite
    </button>

  </div>

  <!-- DATA -->
  <div class="lg:col-span-2 fade">

    <div class="glass p-5 rounded-2xl mb-4">
      <h2 class="text-xl font-bold neon">
        📊 Data Microsite
      </h2>
      <p class="opacity-70 text-sm">
        Semua microsite yang sudah dibuat
      </p>
      
      <!-- SEARCH BAR -->
      <div class="mt-3">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Cari microsite (judul, slug, deskripsi)..."
          class="w-full p-3 text-black rounded-lg"
        >
      </div>

      <!-- FILTER KATEGORI MICROSITE (BARU) -->
      <div class="mt-3 flex flex-wrap gap-1" id="micrositeCategoryFilters">
        <button class="ms-cat-filter-btn active" data-cat="OPD">🏘️ OPD</button>
        <button class="ms-cat-filter-btn active" data-cat="Kecamatan">🏢 Kecamatan</button>
        <button class="ms-cat-filter-btn active" data-cat="Dokumen">📄 Dokumen</button>
        <button class="ms-cat-filter-btn active" data-cat="FASILITATOR">🔒 FASILITATOR</button>
        <button class="ms-cat-filter-btn active" data-cat="Publik">🌐 Publik</button>
        <button class="ms-cat-filter-btn active" data-cat="Lainnya">📁 Lainnya</button>
      </div>
    </div>

    <div id="list" class="grid md:grid-cols-2 gap-4"></div>

  </div>

</div>

<!-- MODAL LINK -->
<div
  id="modalLink"
  class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4"
>
  <div class="glass p-6 rounded-2xl w-full max-w-sm fade">

    <h2 class="text-lg mb-4 neon">
      🔗 Tambah Link
    </h2>

    <input
      id="linkName"
      placeholder="Nama Link"
      class="w-full p-3 text-black rounded-lg mb-3"
    >

    <input
      id="linkUrl"
      placeholder="https://..."
      class="w-full p-3 text-black rounded-lg mb-3"
    >

    <!-- KATEGORI LINK -->
    <select
      id="linkCategory"
      class="w-full p-3 text-black rounded-lg mb-4"
    >
      <option value="Dokumen">📄 Dokumen</option>
      <option value="Website">🌐 Website</option>
      <option value="Spreadsheet">📊 Spreadsheet</option>
      <option value="Drive">📂 Drive</option>
      <option value="Lainnya">🔗 Lainnya</option>
    </select>

    <div class="flex gap-2 justify-end">

      <button
        onclick="closeModal()"
        class="bg-gray-500 px-4 py-2 rounded-lg"
      >
        Batal
      </button>

      <button
        onclick="saveLink()"
        class="bg-cyan-500 text-black px-4 py-2 rounded-lg"
      >
        Simpan
      </button>

    </div>
  </div>
</div>

<!-- MODAL QR -->
<div
  id="qrModal"
  class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4"
>
  <div class="glass p-6 rounded-2xl text-center fade">

    <h2 class="mb-4 neon text-lg">
      📱 QR Code
    </h2>

    <div id="qrcode" class="mb-4 flex justify-center"></div>

    <div class="flex gap-2 justify-center">

      <button
        onclick="downloadQR()"
        class="bg-green-500 text-black px-4 py-2 rounded-lg"
      >
        ⬇️ Download
      </button>

      <button
        onclick="closeQR()"
        class="bg-gray-500 px-4 py-2 rounded-lg"
      >
        Tutup
      </button>

    </div>
  </div>
</div>

<script src="admin.js"></script>

<!-- ==================== SCRIPT UNTUK LINK (FILTER & SEARCH) ==================== -->
<script>
  (function() {
    const activeCategories = new Set(['Dokumen', 'Website', 'Spreadsheet', 'Drive', 'Lainnya']);

    function updateLinkCategories() {
      const linkElements = document.querySelectorAll('#links > div');
      linkElements.forEach(el => {
        if (el.hasAttribute('data-category')) return;
        const text = el.textContent || '';
        const categories = ['Dokumen', 'Website', 'Spreadsheet', 'Drive', 'Lainnya'];
        for (const cat of categories) {
          if (text.includes(cat)) {
            el.setAttribute('data-category', cat);
            break;
          }
        }
        if (!el.hasAttribute('data-category')) {
          el.setAttribute('data-category', 'Lainnya');
        }
      });
    }

    function applyLinkFilters() {
      const searchTerm = document.getElementById('linkSearch')?.value.toLowerCase().trim() || '';
      const linkElements = document.querySelectorAll('#links > div');
      
      updateLinkCategories();

      linkElements.forEach(el => {
        const cat = el.getAttribute('data-category') || 'Lainnya';
        const text = el.textContent?.toLowerCase() || '';
        const matchSearch = searchTerm === '' || text.includes(searchTerm);
        const catActive = activeCategories.has(cat);

        const show = (catActive && matchSearch) || (searchTerm !== '' && matchSearch);
        el.style.display = show ? '' : 'none';
      });
    }

    function initCategoryButtons() {
      const buttons = document.querySelectorAll('#categoryFilters .cat-filter-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function() {
          const cat = this.getAttribute('data-cat');
          if (activeCategories.has(cat)) {
            activeCategories.delete(cat);
            this.classList.remove('active');
            this.style.opacity = '0.5';
          } else {
            activeCategories.add(cat);
            this.classList.add('active');
            this.style.opacity = '1';
          }
          applyLinkFilters();
        });
        if (activeCategories.has(btn.getAttribute('data-cat'))) {
          btn.classList.add('active');
          btn.style.opacity = '1';
        } else {
          btn.classList.remove('active');
          btn.style.opacity = '0.5';
        }
        btn.style.padding = '0.25rem 0.6rem';
        btn.style.borderRadius = '9999px';
        btn.style.fontSize = '0.7rem';
        btn.style.fontWeight = '600';
        btn.style.cursor = 'pointer';
        btn.style.transition = 'all 0.2s';
        btn.style.background = '#e2e8f0';
        btn.style.color = '#1e293b';
        btn.style.border = 'none';
      });
    }

    function initLinkSearch() {
      const searchInput = document.getElementById('linkSearch');
      if (searchInput) {
        searchInput.addEventListener('input', applyLinkFilters);
      }
    }

    function observeLinkContainer() {
      const target = document.getElementById('links');
      if (!target) return;
      const observer = new MutationObserver(() => {
        applyLinkFilters();
      });
      observer.observe(target, { childList: true, subtree: true });
    }

    function ready() {
      initCategoryButtons();
      initLinkSearch();
      observeLinkContainer();
      applyLinkFilters();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', ready);
    } else {
      ready();
    }
  })();
</script>

<!-- ==================== SCRIPT UNTUK MICROSITE (FILTER KATEGORI & SEARCH) ==================== -->
<script>
  (function() {
    // State filter kategori microsite (awal semua aktif)
    const activeCategoriesMS = new Set(['OPD', 'Kecamatan', 'Dokumen', 'FASILITATOR', 'Publik', 'Lainnya']);

    // Menambahkan atribut data-category ke setiap kartu microsite
    function updateMicrositeCategories() {
      const cards = document.querySelectorAll('#list > div');
      cards.forEach(card => {
        if (card.hasAttribute('data-category')) return;
        // Cari teks kategori di dalam kartu (biasanya ditampilkan sebagai tag)
        const text = card.textContent || '';
        // Urutan pengecekan disesuaikan dengan kemungkinan tampilan
        if (text.includes('FASILITATOR')) {
          card.setAttribute('data-category', 'FASILITATOR');
        } else if (text.includes('Kecamatan')) {
          card.setAttribute('data-category', 'Kecamatan');
        } else if (text.includes('OPD')) {
          card.setAttribute('data-category', 'OPD');
        } else if (text.includes('Dokumen')) {
          card.setAttribute('data-category', 'Dokumen');
        } else if (text.includes('Publik')) {
          card.setAttribute('data-category', 'Publik');
        } else {
          card.setAttribute('data-category', 'Lainnya');
        }
      });
    }

    function applyMicrositeFilters() {
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
      const cards = document.querySelectorAll('#list > div');
      
      updateMicrositeCategories();

      cards.forEach(card => {
        const cat = card.getAttribute('data-category') || 'Lainnya';
        const cardText = card.textContent?.toLowerCase() || '';
        const matchSearch = searchTerm === '' || cardText.includes(searchTerm);
        const catActive = activeCategoriesMS.has(cat);

        // Tampilkan jika kategori aktif DAN cocok search, ATAU search aktif DAN cocok (meski kategori nonaktif)
        const show = (catActive && matchSearch) || (searchTerm !== '' && matchSearch);
        card.style.display = show ? '' : 'none';
      });
    }

    function initMicrositeCategoryButtons() {
      const buttons = document.querySelectorAll('#micrositeCategoryFilters .ms-cat-filter-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function() {
          const cat = this.getAttribute('data-cat');
          if (activeCategoriesMS.has(cat)) {
            activeCategoriesMS.delete(cat);
            this.classList.remove('active');
            this.style.opacity = '0.5';
          } else {
            activeCategoriesMS.add(cat);
            this.classList.add('active');
            this.style.opacity = '1';
          }
          applyMicrositeFilters();
        });
        // Tampilan awal
        if (activeCategoriesMS.has(btn.getAttribute('data-cat'))) {
          btn.classList.add('active');
          btn.style.opacity = '1';
        } else {
          btn.classList.remove('active');
          btn.style.opacity = '0.5';
        }
        // Styling
        btn.style.padding = '0.25rem 0.7rem';
        btn.style.borderRadius = '9999px';
        btn.style.fontSize = '0.7rem';
        btn.style.fontWeight = '600';
        btn.style.cursor = 'pointer';
        btn.style.transition = 'all 0.2s';
        btn.style.background = '#e2e8f0';
        btn.style.color = '#1e293b';
        btn.style.border = 'none';
      });
    }

    function initMicrositeSearch() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', applyMicrositeFilters);
      }
    }

    function observeMicrositeList() {
      const target = document.getElementById('list');
      if (!target) return;
      const observer = new MutationObserver(() => {
        applyMicrositeFilters();
      });
      observer.observe(target, { childList: true, subtree: true });
    }

    function ready() {
      initMicrositeCategoryButtons();
      initMicrositeSearch();
      observeMicrositeList();
      applyMicrositeFilters();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', ready);
    } else {
      ready();
    }
  })();
</script>

</body>
</html>
